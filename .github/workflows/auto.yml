name: Auto Green

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Make change
        run: |
          echo "Update $(date)" >> log.txt

      - name: Commit
        run: |
          git config --global user.name "Sujitkawad"
          git config --global user.email "sujitkawad@gmail.com"
          git add .
          git commit -m "Auto update" || echo "No changes"
          git push
